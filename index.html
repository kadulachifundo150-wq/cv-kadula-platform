<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Platform — Complete System</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --navy: #0F172A;
      --navy-2: #1E293B;
      --navy-3: #334155;
      --slate: #475569;
      --muted: #94A3B8;
      --border: #E2E8F0;
      --bg: #F8FAFC;
      --white: #FFFFFF;
      --blue: #2563EB;
      --accent: #1E3A8A;
      --red: #DC2626;
      --green: #16A34A;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--navy);
    }

    /* Navigation */
    .navbar {
      background: var(--navy);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(0,0,0,.35);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: #fff;
    }
    .logo span { color: var(--blue); }
    .nav-buttons { display: flex; gap: 12px; align-items: center; }
    .nav-btn {
      padding: 8px 20px;
      border-radius: 6px;
      font-size: .8rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .2s;
    }
    .nav-btn-outline {
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
    }
    .nav-btn-outline:hover { background: var(--navy-3); color: #fff; }
    .nav-btn-primary {
      background: var(--blue);
      color: #fff;
    }
    .nav-btn-primary:hover { background: #1d4ed8; }
    .nav-btn-danger {
      background: var(--navy-3);
      color: var(--muted);
    }
    .nav-btn-danger:hover { color: #fff; }
    .user-badge {
      color: var(--muted);
      font-size: .8rem;
      background: var(--navy-2);
      padding: 6px 14px;
      border-radius: 20px;
    }

    /* Main Container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* Cards */
    .card {
      background: var(--white);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 32px;
      margin-bottom: 24px;
    }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--navy);
    }
    .card-subtitle {
      font-size: .85rem;
      color: var(--slate);
      margin-bottom: 24px;
    }

    /* Forms */
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--navy-3);
      margin-bottom: 6px;
      letter-spacing: .04em;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      background: var(--bg);
      transition: all .15s;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1);
      background: #fff;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    /* Buttons */
    .btn {
      padding: 11px 24px;
      border-radius: 8px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all .2s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-primary {
      background: var(--navy);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent); transform: translateY(-1px); }
    .btn-success {
      background: var(--blue);
      color: #fff;
    }
    .btn-success:hover { background: #1d4ed8; }
    .btn-danger {
      background: #FEF2F2;
      color: var(--red);
      border: 1px solid #FECACA;
    }
    .btn-danger:hover { background: #FEE2E2; }
    .btn-outline {
      background: transparent;
      border: 1.5px dashed var(--border);
      color: var(--muted);
      width: 100%;
    }
    .btn-outline:hover { border-color: var(--blue); color: var(--blue); background: #EFF6FF; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 12px;
    }
    .tab {
      padding: 8px 20px;
      background: transparent;
      border: none;
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px;
      transition: all .2s;
    }
    .tab.active {
      background: var(--blue);
      color: #fff;
    }
    .tab:hover:not(.active) { background: var(--bg); color: var(--navy); }

    /* Skills Tags */
    .skills-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .skill-tag {
      background: var(--navy);
      color: #CBD5E1;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: .8rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .skill-tag button {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
    }
    .skill-tag button:hover { color: #fff; }
    .skill-input-group {
      display: flex;
      gap: 10px;
    }
    .skill-input-group input { flex: 1; }

    /* Repeatable Items */
    .repeat-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      background: var(--bg);
    }
    .repeat-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .repeat-header h4 { font-size: .9rem; color: var(--navy-3); }

    /* CV Link Box */
    .cv-link-box {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
    }
    .cv-link-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      font-size: .85rem;
      color: var(--slate);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 12px 24px;
      border-radius: 8px;
      color: #fff;
      font-size: .85rem;
      font-weight: 500;
      z-index: 9999;
      opacity: 0;
      transform: translateY(20px);
      transition: all .3s;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--green); }
    .toast.error { background: var(--red); }

    /* Alert */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: .85rem;
    }
    .alert-error { background: #FEF2F2; color: var(--red); border: 1px solid #FECACA; }
    .alert-success { background: #F0FDF4; color: var(--green); border: 1px solid #BBF7D0; }

    /* Loading */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: all .3s;
    }
    .loading-overlay.hidden { opacity: 0; visibility: hidden; }
    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255,255,255,.1);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      opacity: 0;
      visibility: hidden;
      transition: all .2s;
    }
    .modal-overlay.open { opacity: 1; visibility: visible; }
    .modal {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      max-width: 400px;
      width: 90%;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    /* Table */
    .user-table {
      width: 100%;
      border-collapse: collapse;
    }
    .user-table th,
    .user-table td {
      padding: 14px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .user-table th {
      font-size: .7rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--muted);
    }
    .user-table tr:hover { background: var(--bg); }
    .user-avatar {
      width: 35px;
      height: 35px;
      background: var(--navy-3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 600;
    }
    .user-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .search-input {
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      width: 250px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--navy);
    }
    .stat-label {
      font-size: .7rem;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Public View */
    .public-notice {
      background: #EFF6FF;
      text-align: center;
      padding: 10px;
      color: var(--blue);
      font-size: .8rem;
      border-bottom: 1px solid var(--border);
    }
    .cv-hero {
      background: var(--navy);
      padding: 50px 40px;
      color: #fff;
    }
    .cv-hero-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 40px;
      align-items: center;
    }
    .cv-avatar {
      width: 110px;
      height: 110px;
      background: var(--navy-3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      flex-shrink: 0;
    }
    .cv-name {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 900;
    }
    .cv-title {
      color: var(--muted);
      font-size: .8rem;
      text-transform: uppercase;
      margin-top: 5px;
    }
    .cv-contacts {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 15px;
      font-size: .8rem;
      color: #94A3B8;
    }
    .cv-body {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px;
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 40px;
    }
    .cv-section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      border-bottom: 2px solid var(--navy);
      padding-bottom: 8px;
      margin-bottom: 20px;
    }
    @media (max-width: 768px) {
      .cv-body { grid-template-columns: 1fr; }
      .cv-hero-inner { flex-direction: column; text-align: center; }
      .form-row { grid-template-columns: 1fr; }
      .stats-grid { grid-template-columns: 1fr; }
      .navbar { flex-direction: column; gap: 10px; }
      .container { padding: 20px; }
    }
  </style>
</head>
<body>

<div id="app"></div>

<script>
// ============================================
// FIREBASE CONFIGURATION - REPLACE WITH YOURS
// ============================================
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ============================================
// APPLICATION STATE
// ============================================
let currentUser = null;
let currentView = 'login'; // login, dashboard, manager, public
let publicUserId = null;
let userData = {};

// Dashboard data
let skills = [];
let expItems = [];
let eduItems = [];

// Manager data
let allUsers = [];
let deleteTarget = null;

// ============================================
// HELPER FUNCTIONS
// ============================================
function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function showToast(message, type = 'success') {
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.textContent = message;
  document.body.appendChild(toast);
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => {
    toast.classList.remove('show');
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

// ============================================
// RENDER LOGIN/REGISTER VIEW
// ============================================
async function renderLogin() {
  const usersSnapshot = await db.collection('users').limit(1).get();
  const isFirstUser = usersSnapshot.empty;

  const html = `
    <div style="min-height:100vh;background:var(--navy);display:flex;align-items:center;justify-content:center;padding:20px">
      <div class="card" style="max-width:450px;width:100%">
        <div style="text-align:center;margin-bottom:28px">
          <div class="logo" style="font-size:1.8rem">CV<span>.</span>Platform</div>
          <p style="color:var(--muted);font-size:.8rem;margin-top:8px">Professional Profile System</p>
        </div>

        <div class="tabs" style="margin-bottom:28px">
          <button class="tab active" onclick="switchAuthTab('login')">Sign In</button>
          <button class="tab" onclick="switchAuthTab('register')">Register</button>
        </div>

        <div id="loginForm">
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="loginEmail" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
          </div>
          <button class="btn btn-primary" style="width:100%" onclick="handleLogin()">Sign In</button>
        </div>

        <div id="registerForm" style="display:none">
          ${isFirstUser ? '<div class="alert alert-success" style="margin-bottom:16px">🎉 FIRST USER: You will become the MANAGER. No invite code needed!</div>' : ''}
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="Full Name">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="regEmail" placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="regPassword" placeholder="Min. 6 characters">
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="regPasswordConfirm" placeholder="Re-enter password">
          </div>
          ${!isFirstUser ? `
          <div class="form-group">
            <label>Invite Code</label>
            <input type="text" id="regCode" placeholder="Enter invite code" style="text-transform:uppercase">
          </div>
          ` : ''}
          <button class="btn btn-primary" style="width:100%" onclick="handleRegister()">Create Account</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('app').innerHTML = html;
  window.switchAuthTab = (tab) => {
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
    });
  };
}

// ============================================
// AUTH HANDLERS
// ============================================
async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password) {
    showToast('Please fill in all fields', 'error');
    return;
  }
  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (e) {
    showToast(e.message, 'error');
  }
}

async function handleRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regPasswordConfirm').value;

  if (!name || !email || !password) {
    showToast('Please fill in all fields', 'error');
    return;
  }
  if (password !== confirm) {
    showToast('Passwords do not match', 'error');
    return;
  }
  if (password.length < 6) {
    showToast('Password must be at least 6 characters', 'error');
    return;
  }

  const usersSnapshot = await db.collection('users').limit(1).get();
  const isFirstUser = usersSnapshot.empty;

  if (!isFirstUser) {
    const code = document.getElementById('regCode')?.value.trim().toUpperCase();
    if (!code) {
      showToast('Invite code is required', 'error');
      return;
    }
    const codeDoc = await db.collection('invite_codes').doc('current_code').get();
    if (!codeDoc.exists || codeDoc.data().code !== code) {
      showToast('Invalid invite code', 'error');
      return;
    }
  }

  try {
    const cred = await auth.createUserWithEmailAndPassword(email, password);
    await cred.user.updateProfile({ displayName: name });

    const role = isFirstUser ? 'manager' : 'user';
    await db.collection('users').doc(cred.user.uid).set({
      uid: cred.user.uid,
      name: name,
      email: email,
      role: role,
      targetTitle: '',
      summary: '',
      phone: '',
      location: '',
      linkedin: '',
      skills: [],
      experience: [],
      education: [],
      profileImage: '',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    if (isFirstUser) {
      await db.collection('invite_codes').doc('current_code').set({ code: 'MANAGER123' });
      showToast('🎉 You are the MANAGER!', 'success');
    } else {
      showToast('Account created successfully!', 'success');
    }
  } catch (e) {
    showToast(e.message, 'error');
  }
}

async function handleLogout() {
  await auth.signOut();
  currentUser = null;
  renderLogin();
}

// ============================================
// DASHBOARD VIEW
// ============================================
async function renderDashboard() {
  const userDoc = await db.collection('users').doc(currentUser.uid).get();
  userData = userDoc.data() || {};
  skills = userData.skills || [];
  expItems = userData.experience || [];
  eduItems = userData.education || [];

  const publicLink = `${window.location.origin}${window.location.pathname}?view=public&id=${currentUser.uid}`;

  const html = `
    <div class="navbar">
      <div class="logo">CV<span>.</span>Platform</div>
      <div class="nav-buttons">
        <span class="user-badge">👤 ${escapeHtml(userData.name || currentUser.email)}</span>
        <button class="nav-btn nav-btn-primary" onclick="viewPublicCV()">View My CV</button>
        <button class="nav-btn nav-btn-danger" onclick="handleLogout()">Sign Out</button>
      </div>
    </div>

    <div class="container">
      <div style="display:flex;gap:24px;flex-wrap:wrap">
        <div style="width:240px">
          <div class="card" style="position:sticky;top:100px">
            <div style="margin-bottom:20px">
              <div style="width:80px;height:80px;background:var(--navy);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:#fff;font-size:2rem">📄</div>
              <h3 style="text-align:center;font-size:1rem">${escapeHtml(userData.name || 'Your Name')}</h3>
            </div>
            <hr style="margin:16px 0;border-color:var(--border)">
            <div class="nav-item" style="padding:10px;cursor:pointer;margin:5px 0;border-radius:8px" onclick="showDashboardSection('profile')">📋 Profile</div>
            <div class="nav-item" style="padding:10px;cursor:pointer;margin:5px 0;border-radius:8px" onclick="showDashboardSection('summary')">📝 Summary</div>
            <div class="nav-item" style="padding:10px;cursor:pointer;margin:5px 0;border-radius:8px" onclick="showDashboardSection('skills')">⚡ Skills</div>
            <div class="nav-item" style="padding:10px;cursor:pointer;margin:5px 0;border-radius:8px" onclick="showDashboardSection('experience')">💼 Experience</div>
            <div class="nav-item" style="padding:10px;cursor:pointer;margin:5px 0;border-radius:8px" onclick="showDashboardSection('education')">🎓 Education</div>
            <div class="nav-item" style="padding:10px;cursor:pointer;margin:5px 0;border-radius:8px" onclick="showDashboardSection('share')">🔗 Share CV</div>
          </div>
        </div>

        <div style="flex:1">
          <div id="dashboardProfile" class="card">
            <h2 class="card-title">Profile Information</h2>
            <div class="form-row">
              <div class="form-group"><label>Full Name</label><input type="text" id="profileName" value="${escapeHtml(userData.name || '')}" placeholder="Full Name"></div>
              <div class="form-group"><label>Target Job Title</label><input type="text" id="profileTitle" value="${escapeHtml(userData.targetTitle || '')}" placeholder="e.g. Senior Developer"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Email</label><input type="email" id="profileEmail" value="${escapeHtml(userData.email || '')}" placeholder="email@example.com"></div>
              <div class="form-group"><label>Phone</label><input type="tel" id="profilePhone" value="${escapeHtml(userData.phone || '')}" placeholder="+1234567890"></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Location</label><input type="text" id="profileLocation" value="${escapeHtml(userData.location || '')}" placeholder="City, Country"></div>
              <div class="form-group"><label>LinkedIn/Portfolio</label><input type="url" id="profileLinkedin" value="${escapeHtml(userData.linkedin || '')}" placeholder="https://..."></div>
            </div>
            <button class="btn btn-primary" onclick="saveProfile()">Save Profile</button>
          </div>

          <div id="dashboardSummary" class="card" style="display:none">
            <h2 class="card-title">Professional Summary</h2>
            <div class="form-group"><textarea id="summaryText" rows="6" placeholder="Write a compelling professional summary...">${escapeHtml(userData.summary || '')}</textarea></div>
            <button class="btn btn-primary" onclick="saveSummary()">Save Summary</button>
          </div>

          <div id="dashboardSkills" class="card" style="display:none">
            <h2 class="card-title">Key Skills</h2>
            <div class="skills-container" id="skillsContainer"></div>
            <div class="skill-input-group">
              <input type="text" id="newSkill" placeholder="Type a skill" onkeypress="if(event.key==='Enter')addSkill()">
              <button class="btn btn-success" onclick="addSkill()">+ Add</button>
            </div>
            <button class="btn btn-primary" style="margin-top:20px" onclick="saveSkills()">Save Skills</button>
          </div>

          <div id="dashboardExperience" class="card" style="display:none">
            <h2 class="card-title">Work Experience</h2>
            <div id="expContainer"></div>
            <button class="btn btn-outline" onclick="addExpItem()">+ Add Experience</button>
            <button class="btn btn-primary" style="margin-top:20px" onclick="saveExperience()">Save Experience</button>
          </div>

          <div id="dashboardEducation" class="card" style="display:none">
            <h2 class="card-title">Education</h2>
            <div id="eduContainer"></div>
            <button class="btn btn-outline" onclick="addEduItem()">+ Add Education</button>
            <button class="btn btn-primary" style="margin-top:20px" onclick="saveEducation()">Save Education</button>
          </div>

          <div id="dashboardShare" class="card" style="display:none">
            <h2 class="card-title">Share Your CV</h2>
            <p class="card-subtitle">Share this link anywhere — anyone can view your CV without logging in.</p>
            <div class="cv-link-box">
              <input type="text" id="publicLink" value="${publicLink}" readonly>
              <button class="btn btn-success" onclick="copyLink()">Copy Link</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('app').innerHTML = html;
  renderSkillsTags();
  renderExpList();
  renderEduList();

  window.showDashboardSection = (section) => {
    const sections = ['profile', 'summary', 'skills', 'experience', 'education', 'share'];
    sections.forEach(s => {
      const el = document.getElementById(`dashboard${s.charAt(0).toUpperCase() + s.slice(1)}`);
      if (el) el.style.display = 'none';
    });
    document.getElementById(`dashboard${section.charAt(0).toUpperCase() + section.slice(1)}`).style.display = 'block';
  };
}

function renderSkillsTags() {
  const container = document.getElementById('skillsContainer');
  if (!container) return;
  container.innerHTML = skills.map((s, i) => `
    <div class="skill-tag">${escapeHtml(s)} <button onclick="removeSkill(${i})">×</button></div>
  `).join('');
}

function addSkill() {
  const input = document.getElementById('newSkill');
  const val = input.value.trim();
  if (val && !skills.includes(val)) {
    skills.push(val);
    renderSkillsTags();
    input.value = '';
  }
}

function removeSkill(idx) {
  skills.splice(idx, 1);
  renderSkillsTags();
}

function renderExpList() {
  const container = document.getElementById('expContainer');
  if (!container) return;
  container.innerHTML = expItems.map((item, i) => `
    <div class="repeat-item">
      <div class="repeat-header">
        <h4>Experience ${i + 1}</h4>
        <button class="btn btn-danger" onclick="removeExpItem(${i})">Remove</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Job Title</label><input type="text" id="exp_role_${i}" value="${escapeHtml(item.role || '')}" placeholder="Job Title"></div>
        <div class="form-group"><label>Company</label><input type="text" id="exp_company_${i}" value="${escapeHtml(item.company || '')}" placeholder="Company Name"></div>
      </div>
      <div class="form-group"><label>Duration</label><input type="text" id="exp_duration_${i}" value="${escapeHtml(item.duration || '')}" placeholder="e.g. Jan 2020 - Present"></div>
      <div class="form-group"><label>Description</label><textarea id="exp_desc_${i}" rows="3" placeholder="Key achievements...">${escapeHtml(item.description || '')}</textarea></div>
    </div>
  `).join('');
}

function addExpItem() {
  expItems.push({ role: '', company: '', duration: '', description: '' });
  renderExpList();
}

function removeExpItem(idx) {
  expItems.splice(idx, 1);
  renderExpList();
}

function renderEduList() {
  const container = document.getElementById('eduContainer');
  if (!container) return;
  container.innerHTML = eduItems.map((item, i) => `
    <div class="repeat-item">
      <div class="repeat-header">
        <h4>Education ${i + 1}</h4>
        <button class="btn btn-danger" onclick="removeEduItem(${i})">Remove</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Degree</label><input type="text" id="edu_degree_${i}" value="${escapeHtml(item.degree || '')}" placeholder="BSc Computer Science"></div>
        <div class="form-group"><label>School</label><input type="text" id="edu_school_${i}" value="${escapeHtml(item.school || '')}" placeholder="University Name"></div>
      </div>
      <div class="form-group"><label>Year</label><input type="text" id="edu_year_${i}" value="${escapeHtml(item.year || '')}" placeholder="2024"></div>
      <div class="form-group"><label>Capstone / Notes</label><textarea id="edu_capstone_${i}" rows="2" placeholder="Thesis, awards, honors...">${escapeHtml(item.capstone || '')}</textarea></div>
    </div>
  `).join('');
}

function addEduItem() {
  eduItems.push({ degree: '', school: '', year: '', capstone: '' });
  renderEduList();
}

function removeEduItem(idx) {
  eduItems.splice(idx, 1);
  renderEduList();
}

async function saveProfile() {
  const update = {
    name: document.getElementById('profileName')?.value.trim() || '',
    targetTitle: document.getElementById('profileTitle')?.value.trim() || '',
    email: document.getElementById('profileEmail')?.value.trim() || '',
    phone: document.getElementById('profilePhone')?.value.trim() || '',
    location: document.getElementById('profileLocation')?.value.trim() || '',
    linkedin: document.getElementById('profileLinkedin')?.value.trim() || ''
  };
  await db.collection('users').doc(currentUser.uid).update(update);
  if (update.name) await currentUser.updateProfile({ displayName: update.name });
  showToast('Profile saved!');
}

async function saveSummary() {
  const summary = document.getElementById('summaryText')?.value.trim() || '';
  await db.collection('users').doc(currentUser.uid).update({ summary });
  showToast('Summary saved!');
}

async function saveSkills() {
  await db.collection('users').doc(currentUser.uid).update({ skills });
  showToast('Skills saved!');
}

async function saveExperience() {
  const updated = [];
  for (let i = 0; i < expItems.length; i++) {
    updated.push({
      role: document.getElementById(`exp_role_${i}`)?.value.trim() || '',
      company: document.getElementById(`exp_company_${i}`)?.value.trim() || '',
      duration: document.getElementById(`exp_duration_${i}`)?.value.trim() || '',
      description: document.getElementById(`exp_desc_${i}`)?.value.trim() || ''
    });
  }
  await db.collection('users').doc(currentUser.uid).update({ experience: updated });
  showToast('Experience saved!');
}

async function saveEducation() {
  const updated = [];
  for (let i = 0; i < eduItems.length; i++) {
    updated.push({
      degree: document.getElementById(`edu_degree_${i}`)?.value.trim() || '',
      school: document.getElementById(`edu_school_${i}`)?.value.trim() || '',
      year: document.getElementById(`edu_year_${i}`)?.value.trim() || '',
      capstone: document.getElementById(`edu_capstone_${i}`)?.value.trim() || ''
    });
  }
  await db.collection('users').doc(currentUser.uid).update({ education: updated });
  showToast('Education saved!');
}

function copyLink() {
  const input = document.getElementById('publicLink');
  input.select();
  document.execCommand('copy');
  showToast('Link copied to clipboard!');
}

function viewPublicCV() {
  window.open(`${window.location.origin}${window.location.pathname}?view=public&id=${currentUser.uid}`, '_blank');
}

// ============================================
// MANAGER VIEW
// ============================================
async function renderManager() {
  await loadUsers();

  const codeDoc = await db.collection('invite_codes').doc('current_code').get();
  const currentCode = codeDoc.exists ? codeDoc.data().code : 'MANAGER123';

  const html = `
    <div class="navbar">
      <div class="logo">CV<span>.</span>Platform <span style="font-size:.7rem;background:var(--red);padding:2px 8px;border-radius:20px;margin-left:10px">MANAGER</span></div>
      <div class="nav-buttons">
        <button class="nav-btn nav-btn-danger" onclick="handleLogout()">Sign Out</button>
      </div>
    </div>

    <div class="container">
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div class="stat-label">Total Users</div></div>
        <div class="stat-card"><div class="stat-number" id="todayUsers">0</div><div class="stat-label">Registered Today</div></div>
        <div class="stat-card"><div class="stat-number" id="currentCodeDisplay">${currentCode}</div><div class="stat-label">Current Invite Code</div></div>
      </div>

      <div class="card">
        <h2 class="card-title">Invite Code Management</h2>
        <p class="card-subtitle">Users need this code to register. Change it anytime.</p>
        <div class="form-row">
          <div class="form-group"><label>New Invite Code</label><input type="text" id="newInviteCode" placeholder="Enter new code" style="text-transform:uppercase"></div>
          <div style="display:flex;align-items:flex-end"><button class="btn btn-primary" onclick="updateInviteCode()">Update Code</button></div>
        </div>
      </div>

      <div class="card">
        <h2 class="card-title">User Management</h2>
        <div style="margin-bottom:20px">
          <input type="text" class="search-input" id="userSearch" placeholder="Search by name or email..." onkeyup="filterUsers()">
        </div>
        <table class="user-table">
          <thead><tr><th>User</th><th>Target Role</th><th>Registered</th><th>Actions</th></tr></thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </div>

    <div class="modal-overlay" id="deleteModal">
      <div class="modal">
        <h3>Delete User</h3>
        <p id="deleteMessage">Are you sure you want to delete this user?</p>
        <div class="modal-actions">
          <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
          <button class="btn btn-primary" onclick="confirmDelete()">Delete</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('app').innerHTML = html;
  renderUsersTable();

  window.updateInviteCode = async () => {
    const newCode = document.getElementById('newInviteCode').value.trim().toUpperCase();
    if (!newCode) { showToast('Enter a code', 'error'); return; }
    await db.collection('invite_codes').doc('current_code').set({ code: newCode });
    document.getElementById('currentCodeDisplay').textContent = newCode;
    document.getElementById('newInviteCode').value = '';
    showToast('Invite code updated!');
  };

  window.filterUsers = () => {
    renderUsersTable();
  };

  window.closeModal = () => {
    document.getElementById('deleteModal').classList.remove('open');
    deleteTarget = null;
  };
}

async function loadUsers() {
  const snap = await db.collection('users').get();
  allUsers = [];
  const today = new Date().toDateString();
  let todayCount = 0;

  snap.forEach(doc => {
    const data = doc.data();
    if (data.role === 'manager') return;
    const created = data.createdAt ? data.createdAt.toDate() : new Date();
    if (created.toDateString() === today) todayCount++;
    allUsers.push({ id: doc.id, ...data, createdAt: created });
  });

  document.getElementById('totalUsers').textContent = allUsers.length;
  document.getElementById('todayUsers').textContent = todayCount;
}

function renderUsersTable() {
  const search = document.getElementById('userSearch')?.value.toLowerCase() || '';
  const filtered = allUsers.filter(u => 
    (u.name || '').toLowerCase().includes(search) || 
    (u.email || '').toLowerCase().includes(search)
  );

  const tbody = document.getElementById('usersTableBody');
  if (!tbody) return;

  tbody.innerHTML = filtered.map(u => `
    <tr>
      <td><div class="user-cell"><div class="user-avatar">${(u.name || u.email || '?').charAt(0).toUpperCase()}</div><div><strong>${escapeHtml(u.name || '—')}</strong><br><span style="font-size:.75rem;color:var(--muted)">${escapeHtml(u.email || '—')}</span></div></div></td>
      <td>${escapeHtml(u.targetTitle || '—')}</td>
      <td>${u.createdAt ? u.createdAt.toLocaleDateString() : '—'}</td>
      <td><button class="btn btn-danger" style="padding:5px 12px" onclick="openDeleteModal('${u.id}', '${escapeHtml(u.name || u.email)}')">Delete</button></td>
    </tr>
  `).join('');
}

function openDeleteModal(uid, name) {
  deleteTarget = uid;
  document.getElementById('deleteMessage').innerHTML = `Delete "${name}"? This cannot be undone.`;
  document.getElementById('deleteModal').classList.add('open');
}

async function confirmDelete() {
  if (deleteTarget) {
    await db.collection('users').doc(deleteTarget).delete();
    showToast('User deleted');
    await loadUsers();
    renderUsersTable();
    closeModal();
  }
}

// ============================================
// PUBLIC CV VIEW
// ============================================
async function renderPublicCV(uid) {
  const doc = await db.collection('users').doc(uid).get();
  if (!doc.exists) {
    document.getElementById('app').innerHTML = `
      <div class="public-notice">📄 CV Platform</div>
      <div style="text-align:center;padding:80px"><h2>Profile Not Found</h2><p>This CV link is invalid or the user has been deleted.</p></div>
    `;
    return;
  }

  const data = doc.data();

  const html = `
    <div class="public-notice">📄 This is a public CV view — no login required</div>
    <div class="cv-hero">
      <div class="cv-hero-inner">
        <div class="cv-avatar">${(data.name || '?').charAt(0).toUpperCase()}</div>
        <div>
          <h1 class="cv-name">${escapeHtml(data.name || 'Unknown')}</h1>
          <p class="cv-title">${escapeHtml(data.targetTitle || 'Professional Profile')}</p>
          <div class="cv-contacts">
            ${data.email ? `<span>📧 ${escapeHtml(data.email)}</span>` : ''}
            ${data.phone ? `<span>📞 ${escapeHtml(data.phone)}</span>` : ''}
            ${data.location ? `<span>📍 ${escapeHtml(data.location)}</span>` : ''}
          </div>
        </div>
      </div>
    </div>

    <div class="cv-body">
      <div class="cv-sidebar">
        <div class="cv-section">
          <h3 class="cv-section-title">Key Skills</h3>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${(data.skills || []).map(s => `<span style="background:var(--navy);color:#CBD5E1;padding:4px 12px;border-radius:20px;font-size:.8rem">${escapeHtml(s)}</span>`).join('') || '<span style="color:var(--muted)">No skills listed</span>'}
          </div>
        </div>
        ${data.documents && data.documents.length ? `
        <div class="cv-section" style="margin-top:30px">
          <h3 class="cv-section-title">Documents</h3>
          ${data.documents.map(d => `<div style="margin-bottom:10px"><a href="${d.url}" target="_blank" style="color:var(--blue);text-decoration:none">📄 ${escapeHtml(d.name)}</a></div>`).join('')}
        </div>
        ` : ''}
      </div>

      <div class="cv-main">
        ${data.summary ? `
        <div class="cv-section">
          <h3 class="cv-section-title">Professional Summary</h3>
          <p style="line-height:1.7;color:var(--slate)">${escapeHtml(data.summary)}</p>
        </div>
        ` : ''}

        ${data.experience && data.experience.length ? `
        <div class="cv-section">
          <h3 class="cv-section-title">Work Experience</h3>
          ${data.experience.map(exp => `
            <div style="margin-bottom:24px">
              <h4 style="font-size:.95rem;font-weight:700">${escapeHtml(exp.role || '')}</h4>
              <p style="color:var(--blue);font-size:.8rem;margin:4px 0">${escapeHtml(exp.company || '')} | ${escapeHtml(exp.duration || '')}</p>
              <p style="font-size:.85rem;color:var(--slate);line-height:1.6">${escapeHtml(exp.description || '')}</p>
            </div>
          `).join('')}
        </div>
        ` : ''}

        ${data.education && data.education.length ? `
        <div class="cv-section">
          <h3 class="cv-section-title">Education</h3>
          ${data.education.map(edu => `
            <div style="margin-bottom:20px">
              <h4 style="font-size:.95rem;font-weight:700">${escapeHtml(edu.degree || '')}</h4>
              <p style="color:var(--blue);font-size:.8rem;margin:4px 0">${escapeHtml(edu.school || '')} (${escapeHtml(edu.year || '')})</p>
              ${edu.capstone ? `<p style="font-size:.85rem;color:var(--slate)">${escapeHtml(edu.capstone)}</p>` : ''}
            </div>
          `).join('')}
        </div>
        ` : ''}
      </div>
    </div>
  `;

  document.getElementById('app').innerHTML = html;
}

// ============================================
// AUTH STATE HANDLER
// ============================================
auth.onAuthStateChanged(async (user) => {
  const urlParams = new URLSearchParams(window.location.search);
  const publicView = urlParams.get('view') === 'public';
  const publicId = urlParams.get('id');

  if (publicView && publicId) {
    renderPublicCV(publicId);
    return;
  }

  if (!user) {
    renderLogin();
    return;
  }

  const userDoc = await db.collection('users').doc(user.uid).get();
  const isManager = userDoc.exists && userDoc.data().role === 'manager';

  currentUser = user;
  if (isManager) {
    renderManager();
  } else {
    renderDashboard();
  }
});

// Make functions globally accessible
window.handleLogin = handleLogin;
window.handleRegister = handleRegister;
window.handleLogout = handleLogout;
window.viewPublicCV = viewPublicCV;
window.copyLink = copyLink;
window.addSkill = addSkill;
window.removeSkill = removeSkill;
window.addExpItem = addExpItem;
window.removeExpItem = removeExpItem;
window.addEduItem = addEduItem;
window.removeEduItem = removeEduItem;
window.saveProfile = saveProfile;
window.saveSummary = saveSummary;
window.saveSkills = saveSkills;
window.saveExperience = saveExperience;
window.saveEducation = saveEducation;
window.openDeleteModal = openDeleteModal;
window.confirmDelete = confirmDelete;
window.closeModal = () => document.getElementById('deleteModal')?.classList.remove('open');
</script>
</body>
</html>
